<!DOCTYPE html>
<html>
<head>
    <title>AI Based Fire Detection</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff512f, #dd2476);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url(https://tse2.mm.bing.net/th/id/OIP.EjQftHc7cXlGB4voavZEvAHaEO?pid=Api&P=0&h=180);
        }
        

        .container{
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }

        h1{
            color: #ff512f;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #ff512f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background-color: #dd2476;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Based Fire Detection</h1>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
